<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>魂の目覚め度診断 | アルケミスト</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Noto+Serif+JP:wght@300;400;500&family=IM+Fell+English+SC&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8d5a3;
    --gold-dim: #7a5f2a;
    --deep: #0a0812;
    --void: #04030a;
    --indigo: #1a1040;
    --purple: #2d1b5e;
    --rose: #8b3a6b;
    --teal: #1a5f5a;
    --cream: #f5edd8;
    --text: #e8d5a3;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--void);
    color: var(--text);
    font-family: 'Noto Serif JP', serif;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: default;
  }

  /* ── Starfield ── */
  #stars {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse at 20% 30%, rgba(42,26,100,.6) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 70%, rgba(139,58,107,.3) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(26,16,64,.8) 0%, transparent 70%),
      var(--void);
  }
  #stars::before, #stars::after {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(201,168,76,.8), transparent),
      radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,.6), transparent),
      radial-gradient(1.5px 1.5px at 40% 10%, rgba(201,168,76,.9), transparent),
      radial-gradient(1px 1px at 55% 60%, rgba(255,255,255,.5), transparent),
      radial-gradient(1px 1px at 70% 25%, rgba(201,168,76,.7), transparent),
      radial-gradient(1.5px 1.5px at 85% 80%, rgba(255,255,255,.8), transparent),
      radial-gradient(1px 1px at 15% 75%, rgba(201,168,76,.6), transparent),
      radial-gradient(1px 1px at 90% 45%, rgba(255,255,255,.4), transparent),
      radial-gradient(1px 1px at 35% 85%, rgba(201,168,76,.5), transparent),
      radial-gradient(1px 1px at 60% 35%, rgba(255,255,255,.7), transparent),
      radial-gradient(1px 1px at 5% 55%, rgba(201,168,76,.4), transparent),
      radial-gradient(1px 1px at 75% 90%, rgba(255,255,255,.6), transparent),
      radial-gradient(1px 1px at 45% 20%, rgba(201,168,76,.8), transparent),
      radial-gradient(1px 1px at 20% 95%, rgba(255,255,255,.3), transparent),
      radial-gradient(1px 1px at 95% 15%, rgba(201,168,76,.7), transparent),
      radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,.5), transparent),
      radial-gradient(1px 1px at 65% 70%, rgba(201,168,76,.6), transparent),
      radial-gradient(1px 1px at 80% 50%, rgba(255,255,255,.4), transparent);
    animation: twinkle 4s ease-in-out infinite alternate;
  }
  #stars::after {
    background-image:
      radial-gradient(1px 1px at 8% 30%, rgba(255,255,255,.6), transparent),
      radial-gradient(1px 1px at 22% 70%, rgba(201,168,76,.5), transparent),
      radial-gradient(1px 1px at 48% 45%, rgba(255,255,255,.7), transparent),
      radial-gradient(1px 1px at 73% 12%, rgba(201,168,76,.8), transparent),
      radial-gradient(1px 1px at 88% 65%, rgba(255,255,255,.5), transparent),
      radial-gradient(1px 1px at 12% 88%, rgba(201,168,76,.4), transparent),
      radial-gradient(1px 1px at 56% 78%, rgba(255,255,255,.6), transparent),
      radial-gradient(1px 1px at 38% 22%, rgba(201,168,76,.7), transparent),
      radial-gradient(1px 1px at 92% 38%, rgba(255,255,255,.4), transparent),
      radial-gradient(1px 1px at 67% 55%, rgba(201,168,76,.5), transparent);
    animation-delay: 2s;
    animation-duration: 5s;
  }
  @keyframes twinkle {
    0% { opacity: .6; } 100% { opacity: 1; }
  }

  /* ── Layout ── */
  #app {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 40px 20px 80px;
  }

  /* ── Header ── */
  .header-ornament {
    text-align: center;
    margin-bottom: 10px;
    font-size: 1.2rem;
    color: var(--gold);
    letter-spacing: .3em;
    opacity: .7;
  }
  .main-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    color: var(--gold);
    text-align: center;
    text-shadow: 0 0 40px rgba(201,168,76,.5);
    letter-spacing: .05em;
    line-height: 1.4;
  }
  .sub-title {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(.75rem, 2vw, .9rem);
    color: var(--gold-light);
    text-align: center;
    opacity: .7;
    margin-top: 10px;
    letter-spacing: .25em;
  }
  .divider {
    width: 200px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 20px auto;
    opacity: .6;
  }

  /* ── Progress ── */
  .progress-wrap {
    display: flex; align-items: center; gap: 12px;
    margin: 20px 0 30px;
    opacity: .8;
  }
  .progress-bar {
    width: 220px; height: 3px;
    background: rgba(201,168,76,.2);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dim), var(--gold));
    transition: width .6s ease;
  }
  .progress-label {
    font-size: .7rem;
    color: var(--gold);
    letter-spacing: .15em;
    font-family: 'IM Fell English SC', serif;
  }

  /* ── Question ── */
  .question-area {
    text-align: center;
    max-width: 640px;
    margin-bottom: 40px;
    animation: fadeUp .6s ease;
  }
  .question-num {
    font-family: 'IM Fell English SC', serif;
    font-size: .75rem;
    color: var(--gold);
    letter-spacing: .3em;
    opacity: .6;
    margin-bottom: 12px;
  }
  .question-text {
    font-size: clamp(1rem, 2.5vw, 1.25rem);
    color: var(--cream);
    line-height: 1.8;
    font-weight: 300;
    text-shadow: 0 2px 20px rgba(0,0,0,.5);
  }

  /* ── Cards ── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    max-width: 700px;
    width: 100%;
    animation: fadeUp .6s ease .1s both;
  }
  @media (max-width: 500px) {
    .cards-grid { grid-template-columns: 1fr; gap: 12px; }
  }

  .card {
    position: relative;
    background: linear-gradient(135deg, rgba(26,16,64,.9) 0%, rgba(10,8,18,.95) 100%);
    border: 1px solid rgba(201,168,76,.2);
    border-radius: 16px;
    padding: 28px 22px;
    cursor: pointer;
    transition: all .35s cubic-bezier(.25,.8,.25,1);
    overflow: hidden;
    text-align: center;
  }
  .card::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,.08), transparent 60%);
    opacity: 0;
    transition: opacity .35s;
  }
  .card::after {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 16px;
    background: linear-gradient(135deg, rgba(201,168,76,.4), transparent 50%, rgba(201,168,76,.1));
    opacity: 0;
    transition: opacity .35s;
  }
  .card:hover {
    transform: translateY(-4px) scale(1.02);
    border-color: rgba(201,168,76,.5);
    box-shadow: 0 12px 40px rgba(0,0,0,.4), 0 0 30px rgba(201,168,76,.1);
  }
  .card:hover::before { opacity: 1; }
  .card:hover::after { opacity: 1; }
  .card.selected {
    border-color: var(--gold);
    background: linear-gradient(135deg, rgba(42,26,100,.95), rgba(26,16,64,.98));
    transform: translateY(-2px) scale(1.01);
    box-shadow: 0 8px 50px rgba(201,168,76,.2), 0 0 60px rgba(201,168,76,.08);
  }
  .card.selected::before { opacity: 1; }
  .card-symbol {
    font-size: 2.2rem;
    display: block;
    margin-bottom: 14px;
    filter: drop-shadow(0 0 10px rgba(201,168,76,.4));
    transition: transform .35s;
  }
  .card:hover .card-symbol { transform: scale(1.15) rotate(-5deg); }
  .card-label {
    font-size: .7rem;
    font-family: 'IM Fell English SC', serif;
    color: var(--gold);
    letter-spacing: .2em;
    opacity: .6;
    margin-bottom: 8px;
    display: block;
  }
  .card-text {
    font-size: .9rem;
    color: var(--cream);
    line-height: 1.7;
    font-weight: 300;
  }

  /* ── Next button ── */
  .btn-next {
    margin-top: 36px;
    padding: 14px 48px;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Noto Serif JP', serif;
    font-size: .95rem;
    letter-spacing: .2em;
    cursor: pointer;
    border-radius: 4px;
    transition: all .3s;
    position: relative;
    overflow: hidden;
    animation: fadeUp .4s ease .2s both;
  }
  .btn-next::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,.15), transparent);
    transform: translateX(-100%);
    transition: transform .5s;
  }
  .btn-next:hover { background: rgba(201,168,76,.08); box-shadow: 0 0 30px rgba(201,168,76,.15); }
  .btn-next:hover::before { transform: translateX(100%); }
  .btn-next:disabled { opacity: .3; cursor: default; }

  /* ── Result ── */
  .result-wrap {
    max-width: 680px;
    width: 100%;
    animation: fadeUp .8s ease;
  }
  .result-orb {
    width: 140px; height: 140px;
    margin: 0 auto 30px;
    border-radius: 50%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 2.8rem;
    position: relative;
    animation: pulse 3s ease-in-out infinite;
  }
  .result-orb::before {
    content: '';
    position: absolute; inset: -4px;
    border-radius: 50%;
    border: 1px solid;
    animation: spin 8s linear infinite;
    opacity: .4;
  }
  .result-orb::after {
    content: '';
    position: absolute; inset: -16px;
    border-radius: 50%;
    border: 1px dashed;
    animation: spin 12s linear infinite reverse;
    opacity: .2;
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); filter: brightness(1); }
    50% { transform: scale(1.05); filter: brightness(1.15); }
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .result-percent {
    font-family: 'IM Fell English SC', serif;
    font-size: clamp(2.5rem, 8vw, 4rem);
    color: var(--gold);
    text-align: center;
    text-shadow: 0 0 40px rgba(201,168,76,.6);
    line-height: 1;
    margin-bottom: 4px;
  }
  .result-stage-label {
    font-size: .65rem;
    letter-spacing: .3em;
    color: var(--gold);
    opacity: .6;
    text-align: center;
    font-family: 'IM Fell English SC', serif;
    margin-bottom: 16px;
  }
  .result-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.1rem, 3.5vw, 1.6rem);
    color: var(--gold);
    text-align: center;
    text-shadow: 0 0 30px rgba(201,168,76,.4);
    line-height: 1.4;
    margin-bottom: 8px;
  }
  .result-sub {
    font-size: .8rem;
    color: var(--gold-light);
    text-align: center;
    letter-spacing: .15em;
    opacity: .7;
    margin-bottom: 30px;
  }
  .result-card {
    background: linear-gradient(135deg, rgba(26,16,64,.8), rgba(10,8,18,.9));
    border: 1px solid rgba(201,168,76,.25);
    border-radius: 16px;
    padding: 32px 28px;
    margin-bottom: 20px;
  }
  .result-section-title {
    font-family: 'IM Fell English SC', serif;
    font-size: .7rem;
    letter-spacing: .3em;
    color: var(--gold);
    opacity: .6;
    margin-bottom: 12px;
  }
  .result-text {
    font-size: .95rem;
    line-height: 2;
    color: var(--cream);
    font-weight: 300;
  }
  .result-traits {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-top: 16px;
  }
  .trait-tag {
    font-size: .75rem;
    padding: 5px 14px;
    border: 1px solid rgba(201,168,76,.3);
    border-radius: 99px;
    color: var(--gold-light);
    letter-spacing: .1em;
  }
  .result-gifts {
    list-style: none;
    margin-top: 12px;
  }
  .result-gifts li {
    font-size: .9rem;
    color: var(--cream);
    padding: 8px 0;
    border-bottom: 1px solid rgba(201,168,76,.1);
    display: flex; align-items: center; gap: 10px;
    line-height: 1.6;
  }
  .result-gifts li::before {
    content: '✦';
    color: var(--gold);
    font-size: .7rem;
    flex-shrink: 0;
  }
  .cta-box {
    background: linear-gradient(135deg, rgba(45,27,94,.6), rgba(26,16,64,.8));
    border: 1px solid rgba(201,168,76,.4);
    border-radius: 16px;
    padding: 32px 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
    margin-top: 8px;
  }
  .cta-box::before {
    content: '';
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 60%; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .cta-label {
    font-size: .65rem;
    letter-spacing: .3em;
    color: var(--gold);
    opacity: .6;
    font-family: 'IM Fell English SC', serif;
    margin-bottom: 12px;
  }
  .cta-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(.9rem, 2.5vw, 1.1rem);
    color: var(--gold);
    margin-bottom: 14px;
    line-height: 1.5;
  }
  .cta-text {
    font-size: .85rem;
    color: var(--cream);
    opacity: .8;
    line-height: 1.9;
    margin-bottom: 24px;
    font-weight: 300;
  }
  /* ── Sacred Angel CTA Button ── */
  .btn-cta-wrap {
    position: relative;
    display: inline-block;
    margin: 0 auto;
    padding: 20px;
  }
  /* 光輪エフェクト（外側） */
  .btn-cta-halo {
    position: absolute;
    inset: 0;
    border-radius: 60px;
    background: radial-gradient(ellipse at 50% 50%,
      rgba(255,255,220,.18) 0%,
      rgba(201,168,76,.08) 40%,
      transparent 70%);
    animation: haloPulse 3s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes haloPulse {
    0%,100% { transform: scale(1);   opacity: .7; }
    50%      { transform: scale(1.1); opacity: 1;  }
  }
  /* 回転する光の輪 */
  .btn-cta-ring {
    position: absolute;
    inset: 4px;
    border-radius: 50px;
    border: 1px solid rgba(255,255,200,.35);
    animation: ringRotate 8s linear infinite;
    pointer-events: none;
  }
  .btn-cta-ring::before,
  .btn-cta-ring::after {
    content: '✦';
    position: absolute;
    left: 50%; transform: translateX(-50%);
    color: rgba(255,255,200,.8);
    font-size: .65rem;
    text-shadow: 0 0 8px rgba(255,255,150,.9);
  }
  .btn-cta-ring::before { top: -7px; }
  .btn-cta-ring::after  { bottom: -7px; }
  @keyframes ringRotate {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  /* ボタン本体 */
  .btn-cta {
    position: relative;
    display: inline-block;
    padding: 20px 56px;
    background: linear-gradient(160deg,
      rgba(255,255,255,.18) 0%,
      rgba(240,225,180,.12) 40%,
      rgba(201,168,76,.15) 100%);
    color: #fff8e8;
    font-family: 'Noto Serif JP', serif;
    font-size: .95rem;
    letter-spacing: .28em;
    border-radius: 50px;
    cursor: pointer;
    border: 1px solid rgba(255,245,200,.5);
    transition: all .45s ease;
    font-weight: 400;
    box-shadow:
      0 0 30px rgba(255,245,180,.2),
      0 0 80px rgba(201,168,76,.1),
      inset 0 1px 0 rgba(255,255,255,.3),
      inset 0 0 30px rgba(255,255,200,.05);
    backdrop-filter: blur(4px);
    overflow: hidden;
    z-index: 1;
  }
  /* 光が流れるシマー */
  .btn-cta::before {
    content: '';
    position: absolute;
    top: -50%; left: -80%;
    width: 50%; height: 200%;
    background: linear-gradient(105deg,
      transparent,
      rgba(255,255,255,.35),
      rgba(255,245,180,.2),
      transparent);
    animation: shimmer 3.5s ease-in-out infinite;
    pointer-events: none;
  }
  /* 底のグロー線 */
  .btn-cta::after {
    content: '';
    position: absolute;
    bottom: 0; left: 15%; right: 15%; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,245,200,.7), transparent);
  }
  @keyframes shimmer {
    0%   { left: -80%; opacity: 0; }
    20%  { opacity: 1; }
    60%  { left: 120%; opacity: 1; }
    100% { left: 120%; opacity: 0; }
  }
  .btn-cta:hover {
    transform: translateY(-4px) scale(1.04);
    background: linear-gradient(160deg,
      rgba(255,255,255,.28) 0%,
      rgba(240,225,180,.2) 40%,
      rgba(201,168,76,.25) 100%);
    border-color: rgba(255,245,200,.8);
    box-shadow:
      0 0 50px rgba(255,245,180,.4),
      0 0 120px rgba(201,168,76,.2),
      0 10px 40px rgba(0,0,0,.3),
      inset 0 1px 0 rgba(255,255,255,.5),
      inset 0 0 40px rgba(255,255,200,.1);
    letter-spacing: .32em;
  }
  /* ボタン内テキストレイアウト */
  .btn-cta-inner {
    position: relative; z-index: 1;
    display: flex; align-items: center;
    gap: 12px; justify-content: center;
  }
  .btn-cta-icon {
    font-size: 1.1rem;
    filter: drop-shadow(0 0 6px rgba(255,245,150,.9));
    animation: iconGlow 2.5s ease-in-out infinite;
  }
  .btn-cta-icon:last-child { animation-delay: 1.25s; }
  @keyframes iconGlow {
    0%,100% { transform: scale(1);    filter: drop-shadow(0 0 4px rgba(255,245,150,.6)); }
    50%      { transform: scale(1.25); filter: drop-shadow(0 0 12px rgba(255,245,150,1)); }
  }
  .btn-cta-text {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
  }
  .btn-cta-text span:first-child {
    font-size: .7rem;
    letter-spacing: .35em;
    color: rgba(255,245,200,.65);
    font-weight: 300;
  }
  .btn-cta-text span:last-child {
    font-size: .95rem;
    letter-spacing: .22em;
    color: #fff8e8;
    text-shadow: 0 0 20px rgba(255,245,150,.6);
  }


  .btn-retry {
    display: block;
    margin: 16px auto 0;
    background: transparent;
    border: none;
    color: var(--gold);
    opacity: .5;
    font-family: 'Noto Serif JP', serif;
    font-size: .8rem;
    cursor: pointer;
    letter-spacing: .15em;
    text-decoration: underline;
    transition: opacity .3s;
  }
  .btn-retry:hover { opacity: .8; }

  /* ── Intro ── */
  .intro-wrap {
    max-width: 560px;
    text-align: center;
    animation: fadeUp .8s ease;
  }
  .intro-orb {
    width: 100px; height: 100px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, rgba(201,168,76,.3), rgba(42,26,100,.6), rgba(4,3,10,.8));
    margin: 0 auto 30px;
    display: flex; align-items: center; justify-content: center;
    font-size: 2.8rem;
    box-shadow: 0 0 60px rgba(201,168,76,.15), inset 0 0 30px rgba(201,168,76,.1);
    animation: pulse 3s ease-in-out infinite;
    border: 1px solid rgba(201,168,76,.2);
  }
  .intro-text {
    font-size: .95rem;
    color: var(--cream);
    line-height: 2;
    font-weight: 300;
    opacity: .85;
    margin-bottom: 24px;
  }
  .intro-note {
    font-size: .8rem;
    color: var(--gold-light);
    opacity: .5;
    letter-spacing: .15em;
    margin-bottom: 36px;
  }
  /* ── Sacred Start Button ── */
  .btn-start-wrap {
    position: relative;
    display: inline-block;
    padding: 24px;
  }
  /* 外側の大きな光輪 */
  .btn-start-halo {
    position: absolute;
    inset: 0;
    border-radius: 70px;
    background: radial-gradient(ellipse at 50% 50%,
      rgba(255,255,220,.2) 0%,
      rgba(201,168,76,.08) 45%,
      transparent 70%);
    animation: startHalo 3.5s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes startHalo {
    0%,100% { transform: scale(1);    opacity: .6; }
    50%      { transform: scale(1.15); opacity: 1;  }
  }
  /* 二重回転リング */
  .btn-start-ring1 {
    position: absolute;
    inset: 6px;
    border-radius: 60px;
    border: 1px solid rgba(255,255,200,.3);
    animation: startRing1 10s linear infinite;
    pointer-events: none;
  }
  .btn-start-ring1::before,
  .btn-start-ring1::after {
    content: '✦';
    position: absolute;
    left: 50%; transform: translateX(-50%);
    color: rgba(255,255,200,.8);
    font-size: .6rem;
    text-shadow: 0 0 8px rgba(255,255,150,1);
  }

// ===================================================

let current = 0;
let answers = [];
let selectedIdx = null;

function startQuiz() {
  document.getElementById('scene-intro').classList.remove('active');
  document.getElementById('scene-quiz').classList.add('active');
  renderQuestion();
}

function renderQuestion() {
  selectedIdx = null;
  const q = questions[current];
  document.getElementById('q-num').textContent = 'Question ' + ROMAN[current];
  document.getElementById('q-text').textContent = q.text;

  // Progress
  const pct = (current / 7) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = (current + 1) + ' / 7';

  // Cards
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = '';
  q.cards.forEach((c, i) => {
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `<span class="card-symbol">${c.symbol}</span><span class="card-label">${c.label}</span><p class="card-text">${c.text.replace(/\n/g,'<br>')}</p>`;
    div.onclick = () => selectCard(i);
    grid.appendChild(div);
  });

  const btnNext = document.getElementById('btn-next');
  btnNext.disabled = true;
  btnNext.textContent = current < 6 ? '次へ進む →' : '結果を見る ✦';
}

function selectCard(i) {
  document.querySelectorAll('.card').forEach((c,idx) => {
    c.classList.toggle('selected', idx === i);
  });
  selectedIdx = i;
  document.getElementById('btn-next').disabled = false;
}

function nextQuestion() {
  if (selectedIdx === null) return;
  answers.push(questions[current].scores[selectedIdx]);
  current++;
  if (current < 7) {
    renderQuestion();
  } else {
    showResult();
  }
}
